name: python tests
run-name: python tests

on:
  push:
    branches:
      - dev
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-tests.yaml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-tests.yaml'
  workflow_dispatch:

jobs:
  test:
    name: Test with Python ${{ matrix.python-version }}
    if: >
      !(
        contains(github.event.head_commit.message || '', '[skip tests]') ||
        contains(github.event.pull_request.title || '', '[skip tests]') ||
        contains(github.event.pull_request.body || '', '[skip tests]')
      )
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.14"

    env:
      UV_CACHE_DIR: /tmp/.uv-cache
      UV_LINK_MODE: copy

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Restore uv cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-python${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-python${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Type check
        run: uv run pyrefly check

      - name: Lint check
        run: uv run ruff check .
